<html lang="en">

<head>
    <title>PrimePudu | Learn</title>
    <meta name="keywords" content="Math, Free, Pudu, Prime, PrimePudu, Primes, Pudus, Learn, Friendly, Fun, Learning">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
</head>

<body class="learnTab">
    <header class="pageHeader">
        <div id="headerDiv">
            <a href="../">
                <img src="../stock-images/primepudu.png" width="100">
            </a>
            <div class="signInDiv">
                <button id="signInButton" onclick="window.location.href = '/signin'">Sign In</button>
            </div>
            <div id="signedDiv" class="signInDiv">
                <p>Username</p>
            </div>
        </div>
    </header>
    <div id="mainContentDiv"></div>
    <script src="../master.js"></script>
    <script>
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const lessonValue = urlParams.get('lesson');

        fetch("lessons.json").then(response => response.json()).then(lessons => {
            document.getElementsByTagName("title")[0].innerHTML = "PrimePudu | " + lessons[lessonValue].name;
            document.getElementById("mainContentDiv").innerHTML = lessons[lessonValue].content;
        })
    </script>
</body>

</html>
